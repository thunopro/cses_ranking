<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSES Friends Leaderboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-shape shape-1"></div>
    <div class="background-shape shape-2"></div>
    
    <div class="container">
        <header>
            <h1 class="glitch-text" data-text="CSES Leaderboard">CSES Leaderboard</h1>
            <p>Real-time progress of friends on the CSES Problem Set</p>
            <div class="last-updated" id="last-updated">Updating...</div>
        </header>

        <main>
            <div class="table-container glass-panel">
                <table id="leaderboard">
                    <thead>
                        <tr>
                            <th>Rank</th>
                            <th>User</th>
                            <th>Solved Tasks</th>
                            <th>Last Progress</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body">
                        <!-- Data will be injected here by script.js -->
                    </tbody>
                </table>
                
                <div id="loading" class="loading-state">
                    <div class="spinner"></div>
                    <p>Loading ranking data...</p>
                </div>
                
                <div id="error" class="error-state" style="display: none;">
                    <p>⚠️ Failed to load leaderboard data.</p>
                </div>
            </div>
        </main>
        
        <footer>
            <p>Powered by GitHub Actions</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
