name: Update CSES Ranking

on:
  schedule:
    # Runs at 00:00, 06:00, 12:00, 18:00 UTC (Every 6 hours)
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run Crawler
        env:
          CSES_PHPSESSID: ${{ secrets.CSES_PHPSESSID }}
        run: python craw_cses.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/cses_leaderboard.json
          git commit -m "Auto-update CSES leaderboard data" || echo "No changes to commit"
          git push
